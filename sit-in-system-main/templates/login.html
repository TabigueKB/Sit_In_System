<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>CCS Sit-in Monitoring</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .navbar { background-color: #5e3a8c; }
        .nav-link, .navbar-brand { color: white !important; font-size: 14px; }

        /* Password toggle */
        .pw-wrap { position: relative; }
        .pw-wrap .form-control { padding-right: 42px; }
        .pw-toggle {
            position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
            background: none; border: none; padding: 0; cursor: pointer;
            color: #888; line-height: 1; transition: color 0.2s;
        }
        .pw-toggle:hover { color: #5e3a8c; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4">
    <a class="navbar-brand">College of Computer Studies Sit-in Monitoring System</a>
    <div>
        <a class="text-white me-3" href="#">Home</a>
        <a class="text-white me-3" href="#">Community</a>
        <a class="text-white me-3" href="/about">About</a>
        <a class="text-white me-3" href="/">Login</a>
        <a class="text-white" href="/register">Register</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row align-items-center">

        <div class="col-md-6 logo-area">
            <img src="/static/images/logo.png" width="400">
        </div>

        <div class="col-md-4">
            <div class="form-card">
                <form action="/login" method="POST">

                    <input type="text" name="student_id"
                           class="form-control mb-3"
                           placeholder="Enter a valid ID number">

                    <div class="pw-wrap mb-3">
                        <input type="password" name="password" id="login_pw"
                               class="form-control" placeholder="Enter password">
                        <button type="button" class="pw-toggle" onclick="togglePw('login_pw', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>

                    <button class="btn btn-primary w-100">Login</button>

                    <p class="mt-3 text-center">
                        Don't have an account? <a href="/register">Register</a>
                    </p>
                </form>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    const svg = btn.querySelector('svg');
    const showing = input.type === 'password';
    input.type = showing ? 'text' : 'password';
    svg.innerHTML = showing
        ? `<path d="M17.94 17.94A10.99 10.99 0 0112 19c-7 0-11-7-11-7a18.45 18.45 0 015.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
           <circle cx="12" cy="12" r="3"/>`;
}

var flashMessages = {{ get_flashed_messages(with_categories=true) | tojson }};
flashMessages.forEach(function(msg) {
    Swal.fire({
        icon: msg[0], title: msg[1],
        showConfirmButton: false, timer: 2500,
        toast: true, position: "top-end"
    });
});
</script>
</body>
</html>
